name: Build PirReklam Web

on:
  workflow_dispatch:

jobs:

  build_and_push_website:
    name: Build and Push Website
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Website
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/demirdanis/pirreklam-web:latest
          build-args: |
            DIRECTUS_URL=${{ secrets.DIRECTUS_URL }}
            DIRECTUS_STATIC_TOKEN=${{ secrets.DIRECTUS_STATIC_TOKEN }}
            BASE_URL=${{ secrets.BASE_URL }}
            ASSETS_URL=${{ secrets.ASSETS_URL }}
            DIRECTUS_GRAPHQL_URL=${{ secrets.DIRECTUS_GRAPHQL_URL }}
