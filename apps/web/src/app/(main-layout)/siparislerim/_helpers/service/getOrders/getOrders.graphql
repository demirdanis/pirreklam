query GetOrders($limit: Int, $offset: Int) {
  orders(limit: $limit, offset: $offset, sort: ["-created_at"]) {
    id
    stock_number
    product_count
    color_hex
    color_label
    main_option
    secondary_option
    total_price
    piece_price
    total_price_with_tax
    partial_payment_value
    status
    created_at
    product {
      images(limit: 1) {
        small_image {
          filename_disk
        }
      }
    }
    cargo_company {
      name
      cargo_tracking_url
    }
    cargo_tracking_number
    invoice_info {
      full_name
      tckn
    }
  }

  orders_aggregated {
    count {
      id
    }
  }
}
