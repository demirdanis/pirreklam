query GetFooterData {
  footer {
    title
    description
    phone
    whatsapp
    email
    address
    review_url
    long_description
    etbis_url
    copyright
    popular_sub_categories {
      name
      slug
      main_categories_id {
        slug
      }
    }
  }

  social_medias {
    icon
    url
    order
  }
}
