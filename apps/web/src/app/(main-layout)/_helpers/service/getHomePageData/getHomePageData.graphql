query GetHomePageData {
  page__home {
    banners {
      id
      category
      title
      description
      button_text
      button_url
      web_image
      mobile_image
      order
    }
    sectoral_sub_categories {
      id
      name
      slug
      order
      main_categories_id {
        slug
      }
      sector {
        sectors_id {
          id
        }
      }
    }

    popular_sub_categories {
      id
      name
      slug
      order
      card_image
      main_categories_id {
        slug
      }
    }
  }

  sectors {
    id
    name
    description
    web_image
  }
}
