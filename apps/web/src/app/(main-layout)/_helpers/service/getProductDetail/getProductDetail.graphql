query GetProductData($slug: String) {
  product_colors(limit: -1) {
    id
    name
    color
  }
  product_options(limit: -1) {
    id
    name
  }
  products(filter: { slug: { _eq: $slug } }, limit: 1) {
    id
    name
    slug
    sub_category_variation {
      name
      slug
    }
    variatins {
      id
      main_option {
        id
        name
        code
        category {
          id
          name
        }
      }

      secondary_option {
        id
        name
        code
        category {
          id
          name
        }
      }

      color {
        name
        color
      }
      piece_price
      stock_code

      details
      purchase_count_prices {
        id
        count
        price
      }

      images {
        big_image {
          filename_disk
        }
        small_image {
          filename_disk
        }
      }
      video_url
    }
  }
}
